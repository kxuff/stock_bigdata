spark.jars.packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.77.1,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.postgresql:postgresql:42.6.0
spark.master spark://spark-master:7077
spark.submit.deployMode client
spark.driver.host spark-master
spark.driver.bindAddress 0.0.0.0
spark.executor.memory 1g
spark.executor.cores 1
spark.cores.max 1
spark.sql.extensions org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions
spark.sql.catalog.nessie org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.nessie.catalog-impl org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.nessie.uri http://nessie:19120/api/v2
spark.sql.catalog.nessie.ref main
spark.sql.catalog.nessie.authentication.type NONE
spark.sql.catalog.nessie.warehouse s3a://bronze/warehouse
spark.hadoop.fs.s3a.endpoint http://minio:9000
spark.hadoop.fs.s3a.access.key admin
spark.hadoop.fs.s3a.secret.key password
spark.hadoop.fs.s3a.path.style.access true
spark.hadoop.fs.s3a.connection.ssl.enabled false
spark.hadoop.fs.s3a.impl org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
