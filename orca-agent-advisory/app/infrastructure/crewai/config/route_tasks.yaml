route_symbol_comparison_task:
  description: >
    User query: {user_query}. Symbols: {symbols}. Call SymbolLoadTool with
    {symbols}; use the returned warehouse rows as the authoritative data for
    ranking, dates, prices, scores, momentum, trading activity, model risk,
    warnings, and result rows.
    Rank requested symbols by overall ORCA signal quality, not by one metric in
    isolation. Use score, model risk, momentum, trading activity, sentiment, and
    news drivers together. Do not use FreshnessTool for this route. Write as an
    informative advisor: explain what each stock's setup means, why the top name
    leads, what could invalidate the view, and what a user should monitor next.
    Use plain English and avoid a metric dump. Mention exact metrics only when
    they clarify the reasoning. Avoid raw schema names such as final_score,
    risk_prob, RSI14, RVOL20, and as_of in the user-facing message; translate
    them into natural language. If returned rows include old data dates or
    warnings, make that limitation prominent before any recommendation. Do not
    use external data. If a symbol is missing, state it as a limitation.
  expected_output: >
    RouteAgentResponseOutput JSON with message, result_type="symbol_comparison",
    result containing rows, source_refs, and limitations. The message must be
    2-4 short paragraphs or bullets, include a ranked view, explain the why in
    advisor language, call out data freshness when dates/warnings are present,
    be actionable, and include "Not financial advice." Return JSON only with no
    markdown fences.
  agent: route_response_agent

route_watchlist_review_task:
  description: >
    User query: {user_query}. Watchlist symbols: {symbols}. Call SymbolLoadTool
    with {symbols}. Produce a ranked watchlist review from returned ORCA
    signals. Identify top names, weakest names, elevated-risk names, and what
    to monitor next. Use only tool fields.
  expected_output: >
    RouteAgentResponseOutput JSON with message, result_type="watchlist_review",
    result containing items, source_refs, and limitations. Message must include
    ranking rationale using final_score/risk_prob/RSI14/RVOL20/latest_price/as_of,
    not just raw metrics. Return JSON only.
  agent: route_response_agent

route_universe_screen_task:
  description: >
    User query: {user_query}. Requested symbols: {symbols}. If symbols are
    provided, call SymbolLoadTool with {symbols}; otherwise call MarketScreenTool
    with 10. Rank strongest and weakest candidates using final_score and risk
    evidence. Never answer with clarification when symbols or a universe are
    available.
  expected_output: >
    RouteAgentResponseOutput JSON with message, result_type="universe_screen",
    result containing candidates, source_refs, and limitations. Message must
    state top candidate, weakest candidate, key risk flags, and next action.
    Return JSON only.
  agent: route_response_agent

route_market_brief_task:
  description: >
    User query: {user_query}. Interpret the user's requested market brief from
    this exact query. Call MarketScreenTool to fetch current warehouse-backed
    ORCA market rows. Choose the MarketScreenTool input from the user's intent:
    if they ask for a specific count (for example top 10, 10 stocks, ten names),
    call MarketScreenTool with that count; otherwise use 10. Keep tool input
    reasonable for chat responses (1 to 20). Summarize current ORCA market
    leaders, risks, and news themes from tool data only. Write for a normal
    investor, not a quant dashboard. Avoid raw field names such as final_score,
    risk_prob, RSI14, RVOL20, pred_a, r1/r3/r5. Convert scores on a 0..1 scale
    into plain language or /100 only when useful. Explain what signals mean:
    "low model risk", "not overbought", "volume confirmation is weak", etc.
    Use 3-4 clear sections with labels: "Market tone", "Leaders", "Recent news",
    and "What to watch". Write enough detail for a user to understand the why,
    not just the conclusion. Each section should have 2-4 concise sentences.
    Do not use vague labels like "hot themes" or "main read".
    Explain like the reader is not a finance professional. Avoid unexplained jargon
    such as capex, semis, infra, follow-through, overheating, tape, breadth,
    breakout, or crowded. If a term is necessary, explain it in the same sentence.
    Every bullet or sentence must answer at least one of: what it means, which
    stock/group it affects, why it matters, or what to watch next. Do not output
    bare theme phrases like "AI demand", "cloud growth", "chip demand", or
    "earnings momentum" without explaining impact.
    For the leaders section, discuss the top 3-5 names and explain what makes
    each one different in plain English. Do not include raw freshness fields or
    dates such as as_of/Datetime in the user-facing message; if freshness
    matters, describe it in natural language without a timestamp. Include hot
    recent news themes when tool data includes top_drivers or sentiment fields.
  expected_output: >
    RouteAgentResponseOutput JSON with message, result_type="market_brief",
    result containing leaders plus optional highlights, risk_flags, hot_news,
    watch_next, source_refs, and limitations. Return JSON only.
  agent: route_response_agent

route_top_stocks_task:
  description: >
    User query: {user_query}. Interpret the user's requested ranked top-stocks
    list from this exact query. Call MarketScreenTool to fetch current
    warehouse-backed ORCA market rows. Choose the MarketScreenTool input from
    the user's requested count (for example top 10, 10 stocks, ten names); otherwise
    use 10. Keep tool input reasonable for chat responses (1 to 20). Use only
    tool data. Write a concise ranked list in natural language. Avoid raw field
    names such as final_score, risk_prob, RSI14, RVOL20, pred_a, r1/r3/r5.
    Convert scores on a 0..1 scale into /100 only when useful. Explain why each
    name is interesting in plain English using price action, risk, sentiment,
    and recent news. Use 1-2 concise sentences per ranked stock, not terse
    fragments. Do not use vague labels like "hot themes" or "main read".
    Avoid unexplained jargon such as capex, semis, infra, follow-through,
    overheating, tape, breadth, breakout, or crowded. If a term is necessary,
    explain it immediately. Do not output bare theme phrases like "AI demand" or
    "cloud growth" without explaining what they mean for the stocks.
    Do not include raw freshness fields or dates such as
    as_of/Datetime in the user-facing message.
  expected_output: >
    RouteAgentResponseOutput JSON with message, result_type="top_stocks",
    result containing stocks, source_refs, and limitations. Return JSON only.
  agent: route_response_agent

route_portfolio_rebalance_task:
  description: >
    User query: {user_query}. Portfolio context JSON: {portfolio_json}.
    Create an agent-driven rebalance proposal from the user query, provided
    holdings, and constraints. If portfolio_json.holdings is empty but the user
    query includes holdings like "AAPL 35%, MSFT 30%", parse those holdings from
    the user query yourself. If no holdings are present in either place, explain
    naturally what holdings are needed and return result_type="portfolio_rebalance"
    with empty changes.
    Do not execute trades. Do not claim trades were placed. Trade execution is
    disabled and human review is required. Use the user's risk tolerance and
    investment horizon. Explain the recommendation in paragraphs like an advisor:
    portfolio concentration, which weights should rise/fall, why, cash target,
    and what the user should review before acting. You may choose target weights;
    do not default to equal weight unless your reasoning supports it. Use only
    portfolio_json unless another tool is explicitly called and returns data.
    Do not invent market metrics, stale dates, scores, RSI, RVOL, risk_prob,
    final_score, source_refs, or as_of timestamps. Avoid raw schema field names
    in the user-facing message; explain in plain language.
  expected_output: >
    RouteAgentResponseOutput JSON with message, result_type="portfolio_rebalance",
    result containing changes, cash_target_weight, constraints,
    human_review_required=true, and message. Each change must include symbol,
    current_weight, target_weight, and change. Return JSON only.
  agent: route_response_agent

route_data_diagnostics_task:
  description: >
    User query: {user_query}. Call MarketDiagnosticsTool. Explain data source
    status, row counts, table errors, and next action. Do not hide errors.
  expected_output: >
    RouteAgentResponseOutput JSON with message, result_type="data_diagnostics",
    result containing diagnostics, source_refs, and limitations. Include status
    and next action. Return JSON only.
  agent: route_response_agent

route_streaming_freshness_task:
  description: >
    User query: {user_query}. Symbols: {symbols}. Call FreshnessTool with
    {symbols}. Summarize per-symbol and per-table freshness, latest timestamps,
    lag, stale/error rows, and next action. If the tool reports table metadata
    errors, explain them clearly.
  expected_output: >
    RouteAgentResponseOutput JSON with message,
    result_type="streaming_freshness_check", result containing rows,
    source_refs, and limitations. Message must include per-symbol/table status
    evidence rather than a generic diagnostic phrase. Return JSON only.
  agent: route_response_agent
